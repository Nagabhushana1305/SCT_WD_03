<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizZone</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ee;
    --card: #ffffff;
    --ink: #1a1a2e;
    --muted: #8a8a9a;
    --accent: #6c47ff;
    --accent2: #ff6b35;
    --correct: #22c55e;
    --wrong: #ef4444;
    --shadow: 0 4px 30px rgba(108,71,255,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Sora', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  /* Decorative background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(108,71,255,0.1), transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,107,53,0.08), transparent 70%);
    pointer-events: none;
  }

  /* ── SCREEN MANAGEMENT ── */
  .screen { display: none; width: 100%; max-width: 640px; }
  .screen.active { display: block; animation: screenIn 0.4s ease; }

  @keyframes screenIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(0,0,0,0.04);
  }

  /* ── HOME SCREEN ── */
  .home-logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), #9b72ff);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1rem;
    box-shadow: 0 8px 24px rgba(108,71,255,0.3);
  }

  .home-logo h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .home-logo p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.4rem;
    font-weight: 300;
  }

  .quiz-categories {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 2rem;
  }

  .category-btn {
    background: var(--bg);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 1.2rem 1rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'Sora', sans-serif;
  }

  .category-btn:hover { border-color: rgba(108,71,255,0.3); background: rgba(108,71,255,0.04); }
  .category-btn.selected { border-color: var(--accent); background: rgba(108,71,255,0.06); }

  .cat-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
  .cat-name { font-size: 0.85rem; font-weight: 600; color: var(--ink); }
  .cat-count { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }

  .difficulty-row {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 2rem;
  }

  .diff-btn {
    flex: 1;
    padding: 0.6rem;
    border: 2px solid var(--bg);
    border-radius: 10px;
    background: var(--bg);
    font-family: 'Sora', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }

  .diff-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(108,71,255,0.06); }

  .start-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--accent), #9b72ff);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(108,71,255,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(108,71,255,0.4); }
  .start-btn:active { transform: scale(0.98); }

  /* ── QUIZ SCREEN ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .progress-wrap {
    flex: 1;
    margin-right: 1rem;
  }

  .progress-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .progress-bar {
    height: 6px;
    background: #e8e4ff;
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #9b72ff);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .score-badge {
    background: rgba(108,71,255,0.08);
    border: 1px solid rgba(108,71,255,0.2);
    color: var(--accent);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 0.4rem 0.9rem;
    border-radius: 99px;
    white-space: nowrap;
  }

  /* Timer */
  .timer-wrap {
    position: relative;
    width: 60px; height: 60px;
    flex-shrink: 0;
  }

  .timer-wrap svg {
    transform: rotate(-90deg);
    width: 60px; height: 60px;
  }

  .timer-track { fill: none; stroke: #e8e4ff; stroke-width: 4; }
  .timer-arc {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 163;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--ink);
  }

  /* Question type badge */
  .q-type-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.7rem;
    border-radius: 6px;
    margin-bottom: 1rem;
  }

  .q-type-badge.mcq { background: rgba(108,71,255,0.1); color: var(--accent); }
  .q-type-badge.multi { background: rgba(255,107,53,0.1); color: var(--accent2); }
  .q-type-badge.fill { background: rgba(34,197,94,0.1); color: var(--correct); }

  .question-text {
    font-size: clamp(1rem, 3vw, 1.25rem);
    font-weight: 600;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 1.8rem;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    margin-bottom: 1.5rem;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    padding: 1rem 1.2rem;
    background: var(--bg);
    border: 2px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    text-align: left;
    transition: all 0.2s;
    font-weight: 400;
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(108,71,255,0.3);
    background: rgba(108,71,255,0.04);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(108,71,255,0.06);
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(34,197,94,0.06);
    color: #15803d;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(239,68,68,0.06);
    color: #b91c1c;
  }

  .option-btn:disabled { cursor: default; }

  .option-letter {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .option-btn.correct .option-letter { background: var(--correct); color: #fff; }
  .option-btn.wrong .option-letter { background: var(--wrong); color: #fff; }

  /* Fill blank */
  .fill-input-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }

  .fill-input {
    width: 100%;
    padding: 1rem 1.2rem;
    border: 2px solid #e5e0f5;
    border-radius: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }

  .fill-input:focus { border-color: var(--accent); }
  .fill-input.correct { border-color: var(--correct); background: rgba(34,197,94,0.04); }
  .fill-input.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.04); }

  /* Feedback */
  .feedback {
    display: none;
    padding: 0.9rem 1.2rem;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 1.2rem;
    animation: feedIn 0.3s ease;
  }

  @keyframes feedIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .feedback.correct-fb { background: rgba(34,197,94,0.1); color: #15803d; border: 1px solid rgba(34,197,94,0.2); display: block; }
  .feedback.wrong-fb { background: rgba(239,68,68,0.08); color: #b91c1c; border: 1px solid rgba(239,68,68,0.15); display: block; }

  .next-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .next-btn.visible { display: block; }
  .next-btn:hover { background: #5538e6; }

  .submit-fill-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1rem;
  }

  .submit-fill-btn:hover { background: #5538e6; }

  /* Multi-select hint */
  .multi-hint {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  /* ── RESULTS SCREEN ── */
  .results-hero {
    text-align: center;
    margin-bottom: 2rem;
  }

  .results-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #9b72ff);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    box-shadow: 0 12px 40px rgba(108,71,255,0.3);
  }

  .result-pct { font-size: 2rem; font-weight: 800; color: #fff; line-height: 1; }
  .result-pct-label { font-size: 0.65rem; color: rgba(255,255,255,0.7); letter-spacing: 0.1em; }

  .results-hero h2 { font-size: 1.8rem; font-weight: 800; color: var(--ink); }
  .results-hero p { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }

  .results-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 2rem;
  }

  .result-stat {
    background: var(--bg);
    border-radius: 14px;
    padding: 1.2rem 1rem;
    text-align: center;
  }

  .result-stat-num { font-size: 1.8rem; font-weight: 800; color: var(--ink); line-height: 1; }
  .result-stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }

  .results-actions {
    display: flex;
    gap: 0.8rem;
  }

  .btn-outline {
    flex: 1;
    padding: 0.9rem;
    background: transparent;
    color: var(--accent);
    border: 2px solid rgba(108,71,255,0.3);
    border-radius: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-outline:hover { border-color: var(--accent); background: rgba(108,71,255,0.04); }

  @media (max-width: 480px) {
    .card { padding: 1.5rem; }
    .quiz-categories { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <div class="card">
    <div class="home-logo">
      <div class="logo-icon">🧠</div>
      <h1>QuizZone</h1>
      <p>Test your knowledge across multiple topics</p>
    </div>

    <div style="font-size:0.75rem;font-weight:600;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.8rem">Choose Category</div>
    <div class="quiz-categories" id="categoryGrid">
      <button class="category-btn selected" data-cat="general" onclick="selectCategory(this)">
        <div class="cat-icon">🌍</div>
        <div class="cat-name">General Knowledge</div>
        <div class="cat-count">10 questions</div>
      </button>
      <button class="category-btn" data-cat="science" onclick="selectCategory(this)">
        <div class="cat-icon">⚗️</div>
        <div class="cat-name">Science</div>
        <div class="cat-count">10 questions</div>
      </button>
      <button class="category-btn" data-cat="history" onclick="selectCategory(this)">
        <div class="cat-icon">🏛️</div>
        <div class="cat-name">History</div>
        <div class="cat-count">10 questions</div>
      </button>
      <button class="category-btn" data-cat="tech" onclick="selectCategory(this)">
        <div class="cat-icon">💻</div>
        <div class="cat-name">Technology</div>
        <div class="cat-count">10 questions</div>
      </button>
    </div>

    <div style="font-size:0.75rem;font-weight:600;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.8rem">Difficulty</div>
    <div class="difficulty-row">
      <button class="diff-btn selected" onclick="selectDiff(this,'easy')">Easy</button>
      <button class="diff-btn" onclick="selectDiff(this,'medium')">Medium</button>
      <button class="diff-btn" onclick="selectDiff(this,'hard')">Hard</button>
    </div>

    <button class="start-btn" onclick="startQuiz()">Start Quiz →</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="quizScreen">
  <div class="card">
    <div class="quiz-header">
      <div class="progress-wrap">
        <div class="progress-label">Question <span id="qNum">1</span> of <span id="qTotal">10</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="score-badge">⭐ <span id="scoreDisplay">0</span></div>
      <div class="timer-wrap" style="margin-left:0.8rem">
        <svg viewBox="0 0 60 60">
          <circle class="timer-track" cx="30" cy="30" r="26"/>
          <circle class="timer-arc" cx="30" cy="30" r="26" id="timerArc"/>
        </svg>
        <div class="timer-text" id="timerText">30</div>
      </div>
    </div>

    <div class="q-type-badge mcq" id="qTypeBadge">Single Choice</div>
    <div class="question-text" id="questionText">Loading...</div>

    <div id="multiHint" class="multi-hint" style="display:none">✓ Select all correct answers</div>
    <div class="options" id="optionsContainer"></div>

    <div id="fillContainer" style="display:none">
      <div class="fill-input-wrap">
        <input type="text" class="fill-input" id="fillInput" placeholder="Type your answer..." autocomplete="off">
      </div>
      <button class="submit-fill-btn" id="submitFillBtn" onclick="checkFill()">Submit Answer</button>
    </div>

    <div class="feedback" id="feedbackBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="resultsScreen">
  <div class="card">
    <div class="results-hero">
      <div class="results-circle">
        <div class="result-pct" id="resultPct">0%</div>
        <div class="result-pct-label">SCORE</div>
      </div>
      <h2 id="resultTitle">Well Done!</h2>
      <p id="resultSub">Here's how you performed</p>
    </div>
    <div class="results-breakdown">
      <div class="result-stat">
        <div class="result-stat-num" style="color:var(--correct)" id="correctCount">0</div>
        <div class="result-stat-label">Correct</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-num" style="color:var(--wrong)" id="wrongCount">0</div>
        <div class="result-stat-label">Wrong</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-num" id="timeUsedStat">0s</div>
        <div class="result-stat-label">Avg. Time</div>
      </div>
    </div>
    <div class="results-actions">
      <button class="btn-outline" onclick="goHome()">🏠 Home</button>
      <button class="start-btn" style="flex:1" onclick="startQuiz()">🔁 Play Again</button>
    </div>
  </div>
</div>

<script>
  const ALL_QUESTIONS = {
    general: [
      { type:'mcq', q:"What is the capital of France?", opts:["London","Berlin","Paris","Madrid"], ans:2 },
      { type:'mcq', q:"How many continents are on Earth?", opts:["5","6","7","8"], ans:2 },
      { type:'multi', q:"Which of these are planets in our solar system?", opts:["Mars","Pluto","Jupiter","Sun"], ans:[0,2] },
      { type:'fill', q:"The Great Wall of China is located in ___.", ans:["china"] },
      { type:'mcq', q:"What is the largest ocean on Earth?", opts:["Atlantic","Indian","Arctic","Pacific"], ans:3 },
      { type:'mcq', q:"How many sides does a hexagon have?", opts:["5","6","7","8"], ans:1 },
      { type:'fill', q:"Water boils at ___ degrees Celsius at sea level.", ans:["100"] },
      { type:'multi', q:"Which of these are primary colors?", opts:["Red","Green","Blue","Yellow"], ans:[0,2,3] },
      { type:'mcq', q:"Who painted the Mona Lisa?", opts:["Van Gogh","Picasso","da Vinci","Rembrandt"], ans:2 },
      { type:'mcq', q:"What is the largest mammal on Earth?", opts:["Elephant","Blue Whale","Giraffe","Hippo"], ans:1 },
    ],
    science: [
      { type:'mcq', q:"What is the chemical symbol for gold?", opts:["Go","Gd","Au","Ag"], ans:2 },
      { type:'mcq', q:"How many bones are in the adult human body?", opts:["186","206","226","246"], ans:1 },
      { type:'fill', q:"The speed of light is approximately ___ km/s.", ans:["300000","300,000"] },
      { type:'multi', q:"Which are noble gases?", opts:["Helium","Oxygen","Neon","Argon"], ans:[0,2,3] },
      { type:'mcq', q:"What planet is known as the Red Planet?", opts:["Venus","Jupiter","Mars","Saturn"], ans:2 },
      { type:'mcq', q:"What is the powerhouse of the cell?", opts:["Nucleus","Ribosome","Mitochondria","Vacuole"], ans:2 },
      { type:'fill', q:"Einstein's famous equation is E = mc___.", ans:["2","²"] },
      { type:'mcq', q:"How many chromosomes do humans have?", opts:["44","46","48","50"], ans:1 },
      { type:'multi', q:"Which of these are states of matter?", opts:["Solid","Liquid","Gas","Plasma"], ans:[0,1,2,3] },
      { type:'mcq', q:"What is the atomic number of carbon?", opts:["4","6","8","12"], ans:1 },
    ],
    history: [
      { type:'mcq', q:"In what year did World War II end?", opts:["1943","1944","1945","1946"], ans:2 },
      { type:'mcq', q:"Who was the first President of the United States?", opts:["Lincoln","Jefferson","Washington","Adams"], ans:2 },
      { type:'fill', q:"The ancient wonder, the Great ___ of Giza, is located in Egypt.", ans:["pyramid","pyramids"] },
      { type:'mcq', q:"What year did the Berlin Wall fall?", opts:["1987","1988","1989","1990"], ans:2 },
      { type:'multi', q:"Which countries were part of the Allied Powers in WWII?", opts:["USA","Germany","UK","USSR"], ans:[0,2,3] },
      { type:'mcq', q:"Who wrote the Declaration of Independence?", opts:["Washington","Jefferson","Madison","Hamilton"], ans:1 },
      { type:'mcq', q:"What ancient civilization built Machu Picchu?", opts:["Aztec","Maya","Inca","Olmec"], ans:2 },
      { type:'fill', q:"Napoleon Bonaparte was exiled to the island of ___.", ans:["saint helena","st helena","elba"] },
      { type:'mcq', q:"In which year did the Titanic sink?", opts:["1910","1911","1912","1913"], ans:2 },
      { type:'mcq', q:"Who was the first woman to win a Nobel Prize?", opts:["Rosalind Franklin","Ada Lovelace","Marie Curie","Florence Nightingale"], ans:2 },
    ],
    tech: [
      { type:'mcq', q:"What does 'CPU' stand for?", opts:["Central Processing Unit","Computer Processing Unit","Central Program Unit","Core Processing Unit"], ans:0 },
      { type:'mcq', q:"Which company created the iPhone?", opts:["Samsung","Google","Apple","Microsoft"], ans:2 },
      { type:'fill', q:"HTML stands for HyperText ___ Language.", ans:["markup"] },
      { type:'multi', q:"Which of these are programming languages?", opts:["Python","HTML","Java","CSS"], ans:[0,2] },
      { type:'mcq', q:"What does 'URL' stand for?", opts:["Unified Resource Locator","Universal Resource Locator","Uniform Resource Locator","United Resource Locator"], ans:2 },
      { type:'mcq', q:"Which company owns Android?", opts:["Apple","Microsoft","Amazon","Google"], ans:3 },
      { type:'fill', q:"The shortcut Ctrl+___ is used to paste.", ans:["v"] },
      { type:'mcq', q:"What does 'RAM' stand for?", opts:["Random Access Memory","Rapid Access Memory","Read Access Memory","Rapid Array Memory"], ans:0 },
      { type:'multi', q:"Which are web browsers?", opts:["Chrome","Firefox","Opera","Photoshop"], ans:[0,1,2] },
      { type:'mcq', q:"What is the binary representation of the number 5?", opts:["100","101","110","111"], ans:1 },
    ],
  };

  let currentCat = 'general';
  let currentDiff = 'easy';
  let questions = [];
  let qIndex = 0;
  let score = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let timerInterval = null;
  let timeLeft = 30;
  let answered = false;
  let selectedMulti = [];
  let totalTimeUsed = 0;

  function selectCategory(btn) {
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentCat = btn.dataset.cat;
  }

  function selectDiff(btn, diff) {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentDiff = diff;
    timeLeft = diff === 'easy' ? 30 : diff === 'medium' ? 20 : 12;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startQuiz() {
    questions = [...ALL_QUESTIONS[currentCat]].sort(() => Math.random() - 0.5).slice(0, 10);
    qIndex = 0; score = 0; correctCount = 0; wrongCount = 0; totalTimeUsed = 0;
    document.getElementById('qTotal').textContent = questions.length;
    showScreen('quizScreen');
    loadQuestion();
  }

  function loadQuestion() {
    clearInterval(timerInterval);
    answered = false;
    selectedMulti = [];

    const q = questions[qIndex];
    const timeLimit = currentDiff === 'easy' ? 30 : currentDiff === 'medium' ? 20 : 12;
    timeLeft = timeLimit;

    document.getElementById('qNum').textContent = qIndex + 1;
    document.getElementById('progressFill').style.width = `${(qIndex / questions.length) * 100}%`;
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('feedbackBox').className = 'feedback';
    document.getElementById('feedbackBox').textContent = '';
    document.getElementById('nextBtn').classList.remove('visible');

    // Type badge
    const badge = document.getElementById('qTypeBadge');
    if (q.type === 'mcq') { badge.textContent = 'Single Choice'; badge.className = 'q-type-badge mcq'; }
    else if (q.type === 'multi') { badge.textContent = 'Multi Select'; badge.className = 'q-type-badge multi'; }
    else { badge.textContent = 'Fill in the Blank'; badge.className = 'q-type-badge fill'; }

    document.getElementById('multiHint').style.display = q.type === 'multi' ? 'flex' : 'none';
    document.getElementById('fillContainer').style.display = q.type === 'fill' ? 'block' : 'none';
    document.getElementById('optionsContainer').style.display = q.type !== 'fill' ? 'flex' : 'none';

    if (q.type !== 'fill') {
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      const letters = ['A','B','C','D'];
      q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
        if (q.type === 'mcq') {
          btn.onclick = () => checkMcq(btn, i);
        } else {
          btn.onclick = () => toggleMulti(btn, i);
        }
        container.appendChild(btn);
      });

      if (q.type === 'multi') {
        // Add submit button for multi
        const sub = document.createElement('button');
        sub.id = 'submitMultiBtn';
        sub.className = 'submit-fill-btn';
        sub.textContent = 'Submit Answers';
        sub.style.marginTop = '0.5rem';
        sub.onclick = checkMulti;
        container.after(sub);
      }
    } else {
      const fi = document.getElementById('fillInput');
      fi.value = '';
      fi.className = 'fill-input';
      fi.disabled = false;
      document.getElementById('submitFillBtn').style.display = 'block';
    }

    startTimer(timeLimit);
  }

  function startTimer(limit) {
    const arc = document.getElementById('timerArc');
    const txt = document.getElementById('timerText');
    const circumference = 163;
    txt.textContent = limit;
    arc.style.strokeDashoffset = 0;
    arc.style.stroke = 'var(--accent)';

    timerInterval = setInterval(() => {
      timeLeft--;
      txt.textContent = timeLeft;
      arc.style.strokeDashoffset = circumference * (1 - timeLeft / limit);
      if (timeLeft <= 5) arc.style.stroke = 'var(--wrong)';
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        totalTimeUsed += limit;
        if (!answered) timeOut();
      }
    }, 1000);
  }

  function timeOut() {
    answered = true;
    wrongCount++;
    showFeedback(false, `⏰ Time's up! ${getCorrectText()}`);
    disableOptions();
    document.getElementById('nextBtn').classList.add('visible');
    if (document.getElementById('submitMultiBtn')) document.getElementById('submitMultiBtn').remove();
    if (document.getElementById('submitFillBtn')) document.getElementById('submitFillBtn').style.display = 'none';
  }

  function checkMcq(btn, idx) {
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);
    totalTimeUsed += (questions[qIndex].type === 'fill' ? 30 : (currentDiff === 'easy' ? 30 : currentDiff === 'medium' ? 20 : 12)) - timeLeft;

    const q = questions[qIndex];
    disableOptions();
    const btns = document.querySelectorAll('.option-btn');
    btn.classList.add(idx === q.ans ? 'correct' : 'wrong');
    btns[q.ans].classList.add('correct');

    if (idx === q.ans) {
      const pts = currentDiff === 'easy' ? 10 : currentDiff === 'medium' ? 15 : 20;
      const bonus = Math.ceil(timeLeft / 5);
      score += pts + bonus;
      correctCount++;
      showFeedback(true, `✓ Correct! +${pts + bonus} points`);
    } else {
      wrongCount++;
      showFeedback(false, `✗ Wrong! ${getCorrectText()}`);
    }

    document.getElementById('nextBtn').classList.add('visible');
  }

  function toggleMulti(btn, idx) {
    if (answered) return;
    btn.classList.toggle('selected');
    if (selectedMulti.includes(idx)) {
      selectedMulti = selectedMulti.filter(i => i !== idx);
    } else {
      selectedMulti.push(idx);
    }
  }

  function checkMulti() {
    if (answered || selectedMulti.length === 0) return;
    answered = true;
    clearInterval(timerInterval);
    totalTimeUsed += (currentDiff === 'easy' ? 30 : currentDiff === 'medium' ? 20 : 12) - timeLeft;

    const q = questions[qIndex];
    disableOptions();
    if (document.getElementById('submitMultiBtn')) document.getElementById('submitMultiBtn').remove();

    const btns = document.querySelectorAll('.option-btn');
    const sortedSel = [...selectedMulti].sort().join(',');
    const sortedAns = [...q.ans].sort().join(',');
    const isCorrect = sortedSel === sortedAns;

    q.ans.forEach(i => btns[i].classList.add('correct'));
    selectedMulti.forEach(i => { if (!q.ans.includes(i)) btns[i].classList.add('wrong'); });

    if (isCorrect) {
      const pts = currentDiff === 'easy' ? 15 : currentDiff === 'medium' ? 20 : 25;
      score += pts;
      correctCount++;
      showFeedback(true, `✓ All correct! +${pts} points`);
    } else {
      wrongCount++;
      showFeedback(false, `✗ Not quite right!`);
    }

    document.getElementById('nextBtn').classList.add('visible');
  }

  function checkFill() {
    if (answered) return;
    const input = document.getElementById('fillInput');
    const val = input.value.trim().toLowerCase();
    if (!val) return;

    answered = true;
    clearInterval(timerInterval);
    totalTimeUsed += (currentDiff === 'easy' ? 30 : currentDiff === 'medium' ? 20 : 12) - timeLeft;

    const q = questions[qIndex];
    document.getElementById('submitFillBtn').style.display = 'none';
    input.disabled = true;

    const isCorrect = q.ans.some(a => val === a.toLowerCase() || val.includes(a.toLowerCase()));

    if (isCorrect) {
      input.classList.add('correct');
      const pts = currentDiff === 'easy' ? 10 : currentDiff === 'medium' ? 15 : 20;
      score += pts;
      correctCount++;
      showFeedback(true, `✓ Correct! +${pts} points`);
    } else {
      input.classList.add('wrong');
      wrongCount++;
      showFeedback(false, `✗ Wrong! Answer: ${q.ans[0]}`);
    }

    document.getElementById('nextBtn').classList.add('visible');
  }

  function getCorrectText() {
    const q = questions[qIndex];
    if (q.type === 'mcq') return `Correct answer: ${q.opts[q.ans]}`;
    if (q.type === 'fill') return `Answer: ${q.ans[0]}`;
    return `Correct answers: ${q.ans.map(i => q.opts[i]).join(', ')}`;
  }

  function showFeedback(correct, msg) {
    const fb = document.getElementById('feedbackBox');
    fb.textContent = msg;
    fb.className = `feedback ${correct ? 'correct-fb' : 'wrong-fb'}`;
  }

  function disableOptions() {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  }

  function nextQuestion() {
    qIndex++;
    if (qIndex >= questions.length) {
      showResults();
    } else {
      loadQuestion();
    }
  }

  function showResults() {
    clearInterval(timerInterval);
    const pct = Math.round((correctCount / questions.length) * 100);
    document.getElementById('resultPct').textContent = pct + '%';
    document.getElementById('correctCount').textContent = correctCount;
    document.getElementById('wrongCount').textContent = wrongCount;
    document.getElementById('timeUsedStat').textContent = Math.round(totalTimeUsed / questions.length) + 's';

    const titles = [
      [0, 39, "Keep Practicing!", "Don't give up — every attempt makes you smarter."],
      [40, 59, "Good Effort!", "You're getting there. Try again to improve!"],
      [60, 79, "Well Done!", "Solid performance! You know your stuff."],
      [80, 99, "Excellent!", "Impressive score! You're a quiz master."],
      [100, 100, "Perfect! 🎉", "Flawless victory! You aced every question!"]
    ];

    const [,,title,sub] = titles.find(([min, max]) => pct >= min && pct <= max) || titles[0];
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultSub').textContent = sub;

    document.getElementById('progressFill').style.width = '100%';
    showScreen('resultsScreen');
  }

  function goHome() {
    showScreen('homeScreen');
  }

  // Enter key for fill
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('fillContainer').style.display !== 'none' && !answered) {
      checkFill();
    }
    if (e.key === 'Enter' && document.getElementById('nextBtn').classList.contains('visible')) {
      nextQuestion();
    }
  });
</script>
</body>
</html>
