<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --panel: #0d1117;
    --border: rgba(0,255,180,0.12);
    --accent: #00ffb4;
    --accent2: #ff6b6b;
    --accent3: #ffd93d;
    --text: #e6f0ff;
    --muted: #4a5568;
    --dim: #1e2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,180,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,180,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(0,255,180,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
    position: relative;
  }

  header h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(1.2rem, 3vw, 1.5rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
  }

  /* ── MAIN CLOCK PANEL ── */
  .clock-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3rem 2.5rem 2.5rem;
    width: min(500px, 96vw);
    box-shadow:
      0 0 0 1px rgba(0,255,180,0.04),
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    margin-bottom: 1.5rem;
  }

  .clock-panel::before {
    content: '';
    position: absolute;
    top: -1px; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  /* Status indicator */
  .status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.running {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1s infinite;
  }

  .status-dot.paused {
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── DISPLAY ── */
  .time-display {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .time-main {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(3.5rem, 14vw, 6rem);
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
    text-shadow: 0 0 30px rgba(0,255,180,0.15);
    transition: color 0.3s;
  }

  .time-main.running { color: #fff; }

  .time-ms {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-top: 0.3rem;
    opacity: 0.8;
  }

  /* Progress ring */
  .progress-ring-wrap {
    position: absolute;
    top: 1.5rem; right: 1.5rem;
    width: 50px; height: 50px;
  }

  .progress-ring-wrap svg {
    transform: rotate(-90deg);
    width: 50px; height: 50px;
  }

  .ring-track { fill: none; stroke: var(--dim); stroke-width: 3; }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 126;
    stroke-dashoffset: 126;
    transition: stroke-dashoffset 0.1s linear;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 0.5rem;
  }

  .btn {
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 0.8rem 2rem;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    outline: none;
  }

  .btn:active { transform: scale(0.96); }

  .btn-start {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    flex: 1;
    max-width: 180px;
  }
  .btn-start:hover {
    background: #00ffcc;
    box-shadow: 0 0 20px rgba(0,255,180,0.3);
  }

  .btn-pause {
    background: transparent;
    color: var(--accent3);
    border-color: rgba(255,217,61,0.3);
    flex: 1;
    max-width: 180px;
  }
  .btn-pause:hover {
    background: rgba(255,217,61,0.08);
    border-color: var(--accent3);
  }

  .btn-lap {
    background: transparent;
    color: var(--text);
    border-color: rgba(255,255,255,0.1);
    padding: 0.8rem 1.4rem;
  }
  .btn-lap:hover {
    border-color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.04);
  }
  .btn-lap:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-reset {
    background: transparent;
    color: var(--accent2);
    border-color: rgba(255,107,107,0.3);
    padding: 0.8rem 1.4rem;
  }
  .btn-reset:hover {
    background: rgba(255,107,107,0.08);
    border-color: var(--accent2);
  }

  /* ── LAPS ── */
  .laps-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: min(500px, 96vw);
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .laps-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .laps-title {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .lap-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    background: rgba(0,255,180,0.08);
    border: 1px solid rgba(0,255,180,0.15);
    padding: 0.2rem 0.7rem;
    border-radius: 99px;
  }

  .laps-list {
    max-height: 280px;
    overflow-y: auto;
  }

  .laps-list::-webkit-scrollbar { width: 4px; }
  .laps-list::-webkit-scrollbar-track { background: transparent; }
  .laps-list::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .lap-empty {
    padding: 3rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .lap-item {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: lapIn 0.3s ease;
    transition: background 0.2s;
  }

  .lap-item:hover { background: rgba(255,255,255,0.02); }

  @keyframes lapIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .lap-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    width: 1.5rem;
  }

  .lap-bar-wrap {
    height: 3px;
    background: var(--dim);
    border-radius: 2px;
    overflow: hidden;
  }

  .lap-bar {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  .lap-split {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    font-size: 0.75rem;
  }

  .lap-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    text-align: right;
  }

  .lap-item.fastest .lap-time { color: var(--accent); }
  .lap-item.fastest .lap-bar { background: var(--accent); }
  .lap-item.slowest .lap-time { color: var(--accent2); }
  .lap-item.slowest .lap-bar { background: var(--accent2); }

  .lap-badge {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .badge-fast { background: rgba(0,255,180,0.1); color: var(--accent); }
  .badge-slow { background: rgba(255,107,107,0.1); color: var(--accent2); }

  @media (max-width: 480px) {
    .clock-panel { padding: 2rem 1.5rem; }
    .controls { gap: 0.6rem; }
    .btn { padding: 0.75rem 1.2rem; font-size: 0.85rem; }
    .btn-start, .btn-pause { max-width: 140px; }
  }
</style>
</head>
<body>

<header>
  <h1>⟨ Stopwatch ⟩</h1>
</header>

<!-- Main Clock -->
<div class="clock-panel">
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>

  <!-- Progress Ring -->
  <div class="progress-ring-wrap">
    <svg viewBox="0 0 50 50">
      <circle class="ring-track" cx="25" cy="25" r="20"/>
      <circle class="ring-fill" cx="25" cy="25" r="20" id="ringFill"/>
    </svg>
  </div>

  <div class="time-display">
    <div class="time-main" id="timeMain">00:00:00</div>
    <div class="time-ms" id="timeMs">.000</div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="startBtn" onclick="startStop()">Start</button>
    <button class="btn btn-pause" id="pauseBtn" onclick="startStop()" style="display:none">Pause</button>
    <button class="btn btn-lap" id="lapBtn" onclick="recordLap()" disabled>Lap</button>
    <button class="btn btn-reset" onclick="reset()">Reset</button>
  </div>
</div>

<!-- Laps Panel -->
<div class="laps-panel">
  <div class="laps-header">
    <div class="laps-title">Lap Times</div>
    <div class="lap-count" id="lapCount">0 laps</div>
  </div>
  <div class="laps-list" id="lapsList">
    <div class="lap-empty" id="lapEmpty">No laps recorded yet</div>
  </div>
</div>

<script>
  let startTime = 0;
  let elapsed = 0;
  let running = false;
  let rafId = null;
  let lapTimes = [];
  let lastLapTime = 0;

  const timeMain = document.getElementById('timeMain');
  const timeMs = document.getElementById('timeMs');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const lapBtn = document.getElementById('lapBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const lapsList = document.getElementById('lapsList');
  const lapCount = document.getElementById('lapCount');
  const lapEmpty = document.getElementById('lapEmpty');
  const ringFill = document.getElementById('ringFill');

  function format(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const mss = ms % 1000;
    return {
      main: `${pad(h)}:${pad(m)}:${pad(s)}`,
      ms: `.${String(mss).padStart(3, '0')}`
    };
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    elapsed = Date.now() - startTime;
    const t = format(elapsed);
    timeMain.textContent = t.main;
    timeMs.textContent = t.ms;

    // Ring: spins every 60 seconds
    const secs = (elapsed / 1000) % 60;
    const offset = 126 - (126 * secs / 60);
    ringFill.style.strokeDashoffset = offset;

    rafId = requestAnimationFrame(tick);
  }

  function startStop() {
    if (!running) {
      startTime = Date.now() - elapsed;
      running = true;
      startBtn.style.display = 'none';
      pauseBtn.style.display = 'flex';
      lapBtn.disabled = false;
      statusDot.className = 'status-dot running';
      statusText.textContent = 'Running';
      timeMain.classList.add('running');
      rafId = requestAnimationFrame(tick);
    } else {
      running = false;
      cancelAnimationFrame(rafId);
      startBtn.style.display = 'flex';
      pauseBtn.style.display = 'none';
      lapBtn.disabled = true;
      statusDot.className = 'status-dot paused';
      statusText.textContent = 'Paused';
      timeMain.classList.remove('running');
    }
  }

  function reset() {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = 0;
    lastLapTime = 0;
    lapTimes = [];
    timeMain.textContent = '00:00:00';
    timeMs.textContent = '.000';
    timeMain.classList.remove('running');
    startBtn.style.display = 'flex';
    pauseBtn.style.display = 'none';
    lapBtn.disabled = true;
    statusDot.className = 'status-dot';
    statusText.textContent = 'Ready';
    ringFill.style.strokeDashoffset = 126;
    lapsList.innerHTML = '';
    lapsList.appendChild(lapEmpty);
    lapEmpty.style.display = 'block';
    lapCount.textContent = '0 laps';
  }

  function recordLap() {
    if (!running) return;
    const lapTime = elapsed - lastLapTime;
    lapTimes.push({ total: elapsed, split: lapTime });
    lastLapTime = elapsed;
    renderLaps();
  }

  function renderLaps() {
    lapEmpty.style.display = 'none';
    lapCount.textContent = `${lapTimes.length} lap${lapTimes.length !== 1 ? 's' : ''}`;

    const splits = lapTimes.map(l => l.split);
    const minSplit = Math.min(...splits);
    const maxSplit = Math.max(...splits);
    const maxSplitVal = Math.max(...splits);

    lapsList.innerHTML = '';

    // newest first
    [...lapTimes].reverse().forEach((lap, i) => {
      const realIdx = lapTimes.length - i;
      const isFastest = splits.length > 1 && lap.split === minSplit;
      const isSlowest = splits.length > 1 && lap.split === maxSplit;
      const barWidth = maxSplitVal > 0 ? (lap.split / maxSplitVal * 100) : 0;

      const t = format(lap.total);
      const s = format(lap.split);

      const div = document.createElement('div');
      div.className = `lap-item${isFastest ? ' fastest' : ''}${isSlowest ? ' slowest' : ''}`;
      div.innerHTML = `
        <div class="lap-num">${String(realIdx).padStart(2,'0')}</div>
        <div class="lap-bar-wrap"><div class="lap-bar" style="width:${barWidth}%"></div></div>
        <div class="lap-split">${s.main}${s.ms}</div>
        <div style="display:flex;align-items:center;gap:0.4rem">
          ${isFastest ? '<span class="lap-badge badge-fast">Best</span>' : ''}
          ${isSlowest ? '<span class="lap-badge badge-slow">Slow</span>' : ''}
          <div class="lap-time">${t.main}${t.ms}</div>
        </div>
      `;
      lapsList.appendChild(div);
    });
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); startStop(); }
    if (e.code === 'KeyL' && running) recordLap();
    if (e.code === 'KeyR') reset();
  });
</script>
</body>
</html>
